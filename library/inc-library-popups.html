<div id="dimoverlay"></div>
<div class="popupmenu" id="pageselector">
    <div class="popuptitle">Go to page</div>
    {{pageSelectorLinks}}
</div>
<div class="popupmenu" id="searchbox">
    <div class="popuptitle">Find book</div>
    <form id="searchform" method="POST" action="?search=simple">
        <input class="textbox" type="text" name="searchstring"/>
        <input class="actionbutton" type="submit" value="Search"/>
    </form>
    <br/>
</div>
<div class="popupmenu" id="bookdetails"></div>
<div class="popupmenu" id="settingsbox">
    <div class="popuptitle"><span class="categorytitle">{{category}}</span> paramètres d'affichage</div>
    <form id="settingsform" method="POST" action="{{rootPath}}/{{category}}?settings=true">
        <div class="sectiontitle">Regroupement</div>
        <!-- ⚠ values must be consistent with grouping enum -->
        <label class="radiolabel">
            <input type="radio" name="grouping" value="FOLDER" {{checkedGroupByFolder}}/>Répertoire</label>
        <label class="radiolabel">
            <input type="radio" name="grouping" value="FLAT" {{checkedNoGrouping}}/>Plat</label>
        <br/>
        <div class="sectiontitle">Critère de tri</div>
        <!-- ⚠ values must be consistent with field enum -->
        <label class="radiolabel">
            <input type="radio" name="sortingCriterion" value="FILE_PATH" {{checkedSortByFilePath}}/>Chemin d'accès </label>
        <label class="radiolabel">
            <input type="radio" name="sortingCriterion" value="FILE_NAME" {{checkedSortByFileName}}/>Nom du fichier</label>
        <br/>
        <label class="radiolabel">
            <input type="radio" name="sortingCriterion" value="WRITERS" {{checkedSortByWriters}}/>Auteurs</label>
        <label class="radiolabel">
            <input type="radio" name="sortingCriterion" value="TITLE" {{checkedSortByTitle}}/>Titre</label>
        <br/>
        <label class="radiolabel">
            <input type="radio" name="sortingCriterion" value="DATE_UPDATED" {{checkedSortByDate}}/>Date d'ajout</label>
        <br/>
        <div class="sectiontitle">Order de tri</div>
        <!-- ⚠ values must be consistent with sorting order enum -->
        <label class="radiolabel">
            <input type="radio" name="sortingOrder" value="ASC" {{checkedSortAsc}}/>Ascendant</label>
        <label class="radiolabel">
            <input type="radio" name="sortingOrder" value="DESC" {{checkedSortDesc}}/>Descendant</label>
        <br/>
        <br/>
        <input class="actionbutton" type="submit" value="Confirmer"/>
    </form>
    <br/>
</div>
